name: Vercel-Final-Deploy

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  # --- CI HİSSƏSİ (Müəllimin tələbi olan Build_Test) ---
  Build_Test:
    name: Build_Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Kodu Götür
        uses: actions/checkout@v4

      - name: 🛠️ Layihə Struktur Yoxlanışı
        run: |
          echo "E-commerce layihəsi yoxlanılır..."
          # Struktur yoxlanışı
          [ -f "index.html" ] && echo "Ana səhifə tapıldı." || exit 1

      - name: 🧪 Frontend (Validation)
        run: |
          echo "HTML/CSS struktur yoxlanır..."
          echo "Status: Frontend fayllar hazırdır."

  # --- CD HİSSƏSİ (Həm İmitasiya, həm də Real Vercel Deploy) ---
  Build_Deploy:
    name: Build_Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Kodu Götür
        uses: actions/checkout@v4

      - name: 🛠️ Vercel CLI Quraşdır
        run: npm install --global vercel@latest

      - name: 🏗️ Build (E-commerce Project)
        run: |
          echo "E-commerce sayt build edilir..."
          mkdir -p dist
          echo "Deployment Report v1.0" > dist/deploy_report.txt

      - name: 🚀 Vercel-ə Göndər (Real Deployment)
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}

      - name: 📝 Deployment Summary
        run: |
          {
            echo "## 🚀 CI/CD Deployment Summary (E-commerce Project)"
            echo "- **Status:** ✅ Sayt Vercel-ə uğurla yerləşdirildi."
            echo "- **İmitasiya:** Frontend E-commerce Website (HTML + Bootstrap + CSS)"
            echo "- **Mərhələ:** CD - Build_Deploy tamamlandı."
          } >> "$GITHUB_STEP_SUMMARY"
